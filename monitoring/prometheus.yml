global:
  scrape_interval: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: pdf-merger

scrape_configs:
  - job_name: pdf-merger-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: pdf-merger-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
