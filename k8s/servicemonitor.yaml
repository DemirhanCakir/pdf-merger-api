apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pdf-merger-api
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: pdf-merger-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
