apiVersion: v1
kind: Service
metadata:
  name: pdf-merger-api
  labels:
    app: pdf-merger-api
spec:
  selector:
    app: pdf-merger-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
# NodePort variant for easy minikube access:
#   minikube service pdf-merger-api-np --url
apiVersion: v1
kind: Service
metadata:
  name: pdf-merger-api-np
  labels:
    app: pdf-merger-api
spec:
  selector:
    app: pdf-merger-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort
