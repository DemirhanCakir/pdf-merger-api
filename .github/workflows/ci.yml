name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: pdf-merger-api

jobs:
  # ---------------------------------------------------------------- lint
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff==0.8.6
      - run: ruff check .
      - run: ruff format --check .

  # ---------------------------------------------------------------- test
  test:
    name: Pytest (unit + integration)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pdfuser
          POSTGRES_PASSWORD: pdfpass
          POSTGRES_DB: pdfmerger_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pdfuser -d pdfmerger_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      localstack:
        image: localstack/localstack:3.8
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
        ports: ["4566:4566"]
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://pdfuser:pdfpass@localhost:5432/pdfmerger_test
      TEST_S3_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/unit/ tests/integration/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------- build
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save image artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ---------------------------------------------------------------- deploy
  deploy:
    name: Minikube deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          kubernetes-version: v1.31.0
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load image into minikube
        run: |
          gunzip -c image.tar.gz | docker load
          minikube image load ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
      - name: Patch deployment image
        run: |
          sed -i "s|image: pdf-merger-api:.*|image: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}|" k8s/deployment.yaml
          sed -i "s|imagePullPolicy: Always|imagePullPolicy: IfNotPresent|" k8s/deployment.yaml || true
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.example.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/localstack.yaml
          kubectl wait --for=condition=ready pod -l app=postgres --timeout=180s
          kubectl wait --for=condition=ready pod -l app=localstack --timeout=180s
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/pdf-merger-api --timeout=180s
      - name: Smoke check pod
        run: |
          kubectl get pods -o wide
          kubectl get svc

  # ---------------------------------------------------------------- smoke
  smoke:
    name: Smoke (Newman + k6)
    runs-on: ubuntu-latest
    needs: [deploy, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pdfuser
          POSTGRES_PASSWORD: pdfpass
          POSTGRES_DB: pdfmerger
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pdfuser -d pdfmerger"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      localstack:
        image: localstack/localstack:3.8
        env:
          SERVICES: s3
        ports: ["4566:4566"]
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load image and start API
        run: |
          gunzip -c image.tar.gz | docker load
          docker run -d --name api \
            --network host \
            -e DATABASE_URL=postgresql+psycopg2://pdfuser:pdfpass@localhost:5432/pdfmerger \
            -e S3_ENDPOINT_URL=http://localhost:4566 \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            -e OTEL_ENABLED=false \
            ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          # wait for /health
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then echo OK; break; fi
            sleep 2
          done
      - name: Install Newman
        run: npm install -g newman
      - name: Newman smoke
        run: newman run postman/collection.json --env-var baseUrl=http://localhost:8000
      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.55.0-linux-amd64/k6 /usr/local/bin/
      - name: k6 smoke
        run: k6 run -e BASE_URL=http://localhost:8000 perf/smoke-test.js
      - name: Dump API logs on failure
        if: failure()
        run: docker logs api
